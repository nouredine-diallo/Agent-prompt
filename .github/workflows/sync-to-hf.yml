name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Nettoyage force brute des PDF
        run: |
          # Le robot détruit tous les fichiers PDF avant l'envoi
          find . -name "*.pdf" -type f -delete
          
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan hf-deploy
          git add .
          git commit -m "Deploy to Hugging Face (Zero PDF Guarantee)"
          git remote add huggingface https://Land248:$HF_TOKEN@huggingface.co/spaces/Land248/Agent-prompt
          git push -f huggingface hf-deploy:main